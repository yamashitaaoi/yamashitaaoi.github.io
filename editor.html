<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原稿エディタ - Broadcast Script Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="index.html">
                <div class="logo-icon"></div>
                <h1>Broadcast Script Studio</h1>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">トップ</a></li>
                <li><a href="editor.html" class="active">原稿エディタ</a></li>
                <li><a href="gallery.html">写真・素材</a></li>
                <li><a href="archive.html">過去原稿</a></li>
                <li><a href="guide.html">ご利用ガイド</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 class="page-title">放送原稿エディタ</h2>
        <p class="page-desc">本番用のアナウンススクリプトを作成・編集できます。</p>
        <div class="title-border"></div>

        <div class="editor-wrapper">
            <div class="editor-header-box">
                <button class="btn" onclick="alert('原稿を保存しました。')">原稿を一時保存</button>
                <div class="time-estimate" id="time-est">予想放送時間: 0秒</div>
            </div>
            <textarea id="editor" placeholder="ここに原稿を入力してください..." oninput="updateScriptStats()"></textarea>
            <div class="status-bar" id="char-count">文字数: 0 文字</div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-info">
                <h4>Broadcast Script Studio</h4>
                <p>〒101-0032 東京都千代田区岩本町1-7-1 瀬木ビル9階</p>
                <p>TEL: 03-1234-5678 / FAX: 03-1234-5679</p>
            </div>
        </div>
        <div class="copyright">&copy; 2026 Broadcast Script Studio. All Rights Reserved.</div>
    </footer>

    <script>
        function updateScriptStats() {
            const textarea = document.getElementById('editor');
            const countDisplay = document.getElementById('char-count');
            const timeDisplay = document.getElementById('time-est');
            
            const count = textarea.value.length;
            countDisplay.innerText = `文字数: ${count} 文字`;

            const seconds = Math.ceil(count / 5.5);
            if (seconds === 0) {
                timeDisplay.innerText = `予想放送時間: 0秒`;
            } else if (seconds < 60) {
                timeDisplay.innerText = `予想放送時間: 約 ${seconds} 秒`;
            } else {
                const mins = Math.floor(seconds / 60);
                const remSecs = seconds % 60;
                timeDisplay.innerText = `予想放送時間: 約 ${mins} 分 ${remSecs} 秒`;
            }
        }
    </script>
</body>
</html>
